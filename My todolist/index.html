<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My todolist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/todo-icon.png">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
<body>
    
    <header>
        <a href="index.html" class= "logo">
            <img src="images/todo-logo.png" alt= "logo" width="64">
        </a>
        <h1>Todo List SELMA</h1>
    </header>

    <main>

        <form id="frmTasks" action="#" method="post">
            <input type="text" name="newTask" id="newTask" placeholder="Entrer votre tâche ici...">
            <button type="button" id="btAdd">Ajouter</button>   
               
        </form>
        
        <ul id="taskList">
            <li>
                <span class="task">Manger</span>
                <button class="btDelete"><i class="bi-trash3-fill"></i></button>
            </li>
            <li>
                <span class="task">Lire</span>
                <button class="btDelete"><i class="bi-trash3-fill"></i></button>
            </li>
            <li>
                <span class="task">Dormir</span>
                <button class="btDelete"><i class="bi-trash3-fill"></i></button>
            </li>

          
        
        </ul>
    </main>

    <script src="main.js"> </script>
    
</body>
</html>
